<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Soil Fertility Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#f8fafc] flex items-center justify-center px-4">
    <div class="w-full max-w-md">
        <div class="bg-white border border-gray-200 rounded-2xl shadow-sm p-8">
            <h1 class="text-2xl font-bold text-gray-900 mb-2 text-center">Welcome Back</h1>
            <p class="text-gray-600 text-sm mb-6 text-center">Login to continue to Soil Fertility Index</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="space-y-2 mb-4">
                {% for category, message in messages %}
                <div class="text-sm px-3 py-2 rounded border {% if category=='error' %}bg-red-50 text-red-700 border-red-200{% else %}bg-green-50 text-green-700 border-green-200{% endif %}">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" name="email" required class="input-field w-full" placeholder="you@example.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" name="password" required class="input-field w-full" placeholder="********">
                </div>
                <button type="submit" class="btn-primary w-full">Login</button>
            </form>

            <p class="text-sm text-gray-600 mt-6 text-center">
                Don't have an account?
                <a href="{{ url_for('signup') }}" class="text-blue-600 hover:underline">Sign up</a>
            </p>
        </div>
    </div>
</body>
</html>
